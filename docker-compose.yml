services:
  ais-api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ./deploy/ais.env
    volumes:
      - ais_artefacts:/app/app/artefacts
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      ais-api:
        condition: service_healthy
    env_file:
      - ./deploy/ais.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  ais_artefacts:
  caddy_data:
  caddy_config:
